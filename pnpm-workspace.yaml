allowBuilds:
  '@firebase/util': true
  '@parcel/watcher': true
  '@sentry/cli': true
  '@swc/core': true
  protobufjs: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - postcss@8.5.10 || 8.5.12
  - uuid@11.1.1
  - sharp@0.35.0
overrides:
  postcss@<8.5.10: ^8.5.10
  postcss@<=8.5.11: ^8.5.12
  sharp@<0.35.0: ^0.35.0
  uuid@<11.1.1: ^11.1.1
